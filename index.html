<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Punto C - GRID Completo</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="layout">

<header class="header">
  Encabezado
</header>

<aside class="sidebar">
  <nav>
    <ul>
      <li>Inicio</li>
      <li>Galería</li>
      <li>Servicios</li>
      <li>Contacto</li>
    </ul>
  </nav>
</aside>

<main class="main">

  <!-- GRID ORIGINAL -->
  <div class="contenedor-grid">
    <div class="elemento">1</div>
    <div class="elemento">2</div>
    <div class="elemento">3</div>
    <div class="elemento">4</div>
    <div class="elemento">5</div>
    <div class="elemento">6</div>
  </div>

  <!-- 3) CUADRÍCULA IMPLÍCITA -->
  <section class="seccion">
    <h2>3) Cuadrícula Implícita</h2>
    <div class="grid-implicita">
      <div>A</div>
      <div>B</div>
      <div>C</div>
      <div>D</div>
      <div>E</div>
      <div>F</div>
      <div>G</div>
      <div>H</div>
    </div>
  </section>

  <!-- 4) FLUJO Y DENSIDAD -->
  <section class="seccion">
    <h2>4) Flujo y Densidad</h2>
    <div class="grid-flujo">
      <div class="grande">1</div>
      <div>2</div>
      <div>3</div>
      <div class="alto">4</div>
      <div>5</div>
      <div>6</div>
    </div>
  </section>

  <!-- 5) SUPERPOSICIÓN -->
  <section class="seccion">
    <h2>5) Capas y Superposición</h2>
    <div class="grid-super">
      <img src="descarga.jpg" alt="">
      <div class="texto-super">Texto Encima</div>
    </div>
  </section>

  <!-- 6) ALINEACIÓN -->
  <section class="seccion">
    <h2>6) Alineación</h2>
    <div class="grid-alineacion">
      <div>1</div>
      <div>2</div>
      <div>3</div>
    </div>
  </section>

  <!-- 7) GALERÍA DINÁMICA -->
  <section class="seccion">
    <h2>7) Galería Dinámica</h2>
    <div class="grid-galeria">
      <img src="descarga (1).jpg">
      <img src="descarga (2).jpg">
      <img src="descarga (3).jpg">
      <img src="descarga (4).jpg">
      <img src="descarga (6).jpg">
      <img src="descarga (5).jpg">
    </div>
  </section>

</main>

<section class="noticias">
  Barra de Noticias
</section>

<footer class="footer">
  pie de pagina
</footer>

</div>

</body>
</html>
